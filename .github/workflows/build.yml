name: Build VMware Hardened Loader

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup Windows SDK and WDK
      shell: powershell
      run: |
        Write-Host "Checking pre-installed Windows Kits..."
        Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\" -ErrorAction SilentlyContinue | Select-Object Name

        Write-Host "`nInstalling WDK via Chocolatey..."

        # Install specific WDK version that's known to work
        choco install -y windowsdriverkit10 --version=10.0.19041.685 --force

        Write-Host "`nWaiting for installation..."
        Start-Sleep -Seconds 60

        Write-Host "`nVerifying installation..."
        Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\" -ErrorAction SilentlyContinue | Select-Object Name

        $ntddkFiles = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\*\km\ntddk.h" -Recurse -ErrorAction SilentlyContinue

        if ($ntddkFiles) {
          Write-Host "`nFound ntddk.h at:"
          $ntddkFiles | ForEach-Object { Write-Host $_.FullName }
        } else {
          Write-Error "ntddk.h not found after installation!"

          # Try to find any km directory
          Write-Host "`nSearching for km directories..."
          Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\*\km" -Directory -Recurse -ErrorAction SilentlyContinue

          exit 1
        }

        # Set environment variable for WDK
        $wdkVersion = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\" | Select-Object -First 1).Name
        Write-Host "`nUsing WDK version: $wdkVersion"
        echo "WindowsSDKVersion=$wdkVersion\" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Build Solution
      shell: cmd
      run: |
        msbuild VmLoader.sln /p:Configuration=Release /p:Platform=x64 /p:TargetVersion=Windows10 /m /v:normal

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vmloader-sys
        path: bin/vmloader.sys
        if-no-files-found: error

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          bin/vmloader.sys
          bin/install.bat
          bin/uninstall.bat
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
