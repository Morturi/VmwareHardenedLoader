name: Build VMware Hardened Loader

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install Windows Driver Kit
      shell: powershell
      run: |
        Write-Host "Installing WDK and SDK..."

        # Install Windows SDK first
        choco install windows-sdk-10-version-2004-all -y

        # Download and install WDK
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2249371"
        $installerPath = "$env:TEMP\wdksetup.exe"

        Write-Host "Downloading WDK..."
        Invoke-WebRequest -Uri $wdkUrl -OutFile $installerPath -UseBasicParsing

        Write-Host "Installing WDK (this may take 10-15 minutes)..."
        Start-Process -FilePath $installerPath -ArgumentList "/quiet", "/norestart", "/features", "+" -Wait -NoNewWindow

        Write-Host "WDK installation completed"

        # Verify installation
        if (Test-Path "C:\Program Files (x86)\Windows Kits\10\Include\*\km\ntddk.h") {
          Write-Host "WDK installed successfully"
        } else {
          Write-Error "WDK installation failed - ntddk.h not found"
          exit 1
        }

    - name: Build Solution
      shell: cmd
      run: |
        msbuild VmLoader.sln /p:Configuration=Release /p:Platform=x64 /m /v:normal

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vmloader-sys
        path: bin/vmloader.sys
        if-no-files-found: error

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          bin/vmloader.sys
          bin/install.bat
          bin/uninstall.bat
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
