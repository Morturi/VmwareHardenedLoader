name: Build VMware Hardened Loader

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup Windows SDK and WDK
      shell: powershell
      run: |
        Write-Host "Checking pre-installed Windows Kits..."
        Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\" -ErrorAction SilentlyContinue | Select-Object Name

        Write-Host "`nDownloading WDK installer..."
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2166289"
        $installerPath = "$env:TEMP\wdksetup.exe"

        Invoke-WebRequest -Uri $wdkUrl -OutFile $installerPath -UseBasicParsing -MaximumRetryCount 3

        Write-Host "`nInstalling WDK (this will take 10-15 minutes)..."
        $process = Start-Process -FilePath $installerPath -ArgumentList "/quiet", "/norestart", "/features", "+" -Wait -PassThru -NoNewWindow

        Write-Host "Installation exit code: $($process.ExitCode)"

        Write-Host "`nVerifying installation..."
        Start-Sleep -Seconds 10

        Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\" -ErrorAction SilentlyContinue | Select-Object Name

        $ntddkFiles = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\*\km\ntddk.h" -Recurse -ErrorAction SilentlyContinue

        if ($ntddkFiles) {
          Write-Host "`nFound ntddk.h at:"
          $ntddkFiles | ForEach-Object { Write-Host $_.FullName }
        } else {
          Write-Host "`nWarning: ntddk.h not found, but continuing anyway..."
        }

        # Set environment variable for WDK
        $wdkVersions = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\" -ErrorAction SilentlyContinue
        if ($wdkVersions) {
          $wdkVersion = ($wdkVersions | Select-Object -First 1).Name
          Write-Host "`nUsing WDK version: $wdkVersion"
          echo "WindowsSDKVersion=$wdkVersion\" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        }

    - name: Build Solution
      shell: cmd
      run: |
        msbuild VmLoader.sln /p:Configuration=Release /p:Platform=x64 /p:TargetVersion=Windows10 /p:TreatWarningsAsErrors=false /p:EnableInf2cat=false /p:RunCodeAnalysis=false /p:WDKContentRoot="C:\Program Files (x86)\Windows Kits\10\" /m /v:normal

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vmloader-sys
        path: bin/vmloader.sys
        if-no-files-found: error

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          bin/vmloader.sys
          bin/install.bat
          bin/uninstall.bat
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
