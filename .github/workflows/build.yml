name: Build VMware Hardened Loader

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup Windows SDK and WDK
      shell: powershell
      run: |
        Write-Host "Checking pre-installed Windows Kits..."
        $wdkVersions = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\" -ErrorAction SilentlyContinue | Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' }

        if ($wdkVersions) {
          Write-Host "Found WDK versions:"
          $wdkVersions | ForEach-Object { Write-Host "  - $($_.Name)" }

          # Use the latest version
          $latestWdk = ($wdkVersions | Sort-Object Name -Descending | Select-Object -First 1).Name
          Write-Host "`nUsing WDK version: $latestWdk"

          # Verify ntddk.h exists
          $ntddkPath = "C:\Program Files (x86)\Windows Kits\10\Include\$latestWdk\km\ntddk.h"
          if (Test-Path $ntddkPath) {
            Write-Host "Verified: $ntddkPath exists"
          } else {
            Write-Error "ntddk.h not found at $ntddkPath"
            exit 1
          }
        } else {
          Write-Error "No WDK installation found!"
          exit 1
        }

    - name: Build Solution
      shell: cmd
      run: |
        msbuild VmLoader.sln /p:Configuration=Release /p:Platform=x64 /p:TargetVersion=Windows10 /p:TreatWarningsAsErrors=false /p:EnableInf2cat=false /p:RunCodeAnalysis=false /m /v:normal

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vmloader-sys
        path: bin/vmloader.sys
        if-no-files-found: error

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          bin/vmloader.sys
          bin/install.bat
          bin/uninstall.bat
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
