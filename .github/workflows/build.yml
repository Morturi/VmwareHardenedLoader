name: Build VMware Hardened Loader

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install Windows Driver Kit
      shell: powershell
      run: |
        Write-Host "Installing Windows SDK and WDK via winget..."

        # Install Windows SDK 10
        Write-Host "Installing Windows SDK..."
        winget install --id Microsoft.WindowsSDK.10.0.22621 --silent --accept-source-agreements --accept-package-agreements

        # Install WDK
        Write-Host "Installing WDK..."
        winget install --id Microsoft.WindowsWDK.10.0.22621 --silent --accept-source-agreements --accept-package-agreements

        Write-Host "Waiting for installation to complete..."
        Start-Sleep -Seconds 30

        # List installed WDK versions
        Write-Host "Checking WDK installation..."
        Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\" -ErrorAction SilentlyContinue

        # Find ntddk.h
        $ntddkPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\*\km\ntddk.h" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1

        if ($ntddkPath) {
          Write-Host "WDK installed successfully at: $($ntddkPath.FullName)"
        } else {
          Write-Host "WDK installation may have failed. Trying chocolatey as fallback..."
          choco install windows-sdk-10-version-2004-all -y
          choco install windowsdriverkit10 -y --version=10.0.19041.685

          Start-Sleep -Seconds 30

          $ntddkPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\*\km\ntddk.h" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1

          if ($ntddkPath) {
            Write-Host "WDK installed via chocolatey at: $($ntddkPath.FullName)"
          } else {
            Write-Error "Failed to install WDK"
            exit 1
          }
        }

    - name: Build Solution
      shell: cmd
      run: |
        msbuild VmLoader.sln /p:Configuration=Release /p:Platform=x64 /m /v:normal

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vmloader-sys
        path: bin/vmloader.sys
        if-no-files-found: error

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          bin/vmloader.sys
          bin/install.bat
          bin/uninstall.bat
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
